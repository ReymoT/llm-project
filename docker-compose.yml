services:
  vllm:
    image: vllm/vllm-openai:v0.9.1
    container_name: openserve-vllm
    runtime: nvidia
    ipc: host
    ports:
      - "8001:8000"
    environment:
      - VLLM_USE_V1=0
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command:
      - --model
      - Qwen/Qwen3-0.6B
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - dev-vllm-key
      - --max-model-len
      - "2048"
      - --gpu-memory-utilization
      - "0.80"

  gateway:
    build:
      context: ./gateway
    container_name: openserve-gateway
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_API_KEY=openserve-key
      - VLLM_BASE_URL=http://vllm:8000
      - VLLM_API_KEY=dev-vllm-key
      - REQUEST_TIMEOUT_SECONDS=60
    depends_on:
      - vllm